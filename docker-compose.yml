services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  scout:
    build:
      context: .
      dockerfile: services/scout/Dockerfile
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
    restart: always

  filter:
    build:
      context: .
      dockerfile: services/filter/Dockerfile
    restart: always
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  brain:
    build:
      context: .
      dockerfile: services/brain/Dockerfile
    env_file: .env
    restart: unless-stopped

  risk-manager:
    build:
      context: .
      dockerfile: services/risk-manager/Dockerfile
    env_file: .env
    restart: unless-stopped

  messenger:
    build:
      context: .
      dockerfile: services/messenger/Dockerfile
    env_file: .env
    restart: unless-stopped

  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile
    env_file: .env
    restart: unless-stopped
