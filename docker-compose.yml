services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  scout:
    build:
      context: .
      dockerfile: services/scout/Dockerfile
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
    restart: always

  filter:
    build:
      context: .
      dockerfile: services/filter/Dockerfile
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    depends_on:
      - redis

  brain:
    build:
      context: .
      dockerfile: services/brain/Dockerfile
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always
    depends_on:
      - redis

  risk-manager:
    build:
      context: .
      dockerfile: services/risk-manager/Dockerfile
    env_file: .env
    restart: unless-stopped

  messenger:
    build:
      context: .
      dockerfile: services/messenger/Dockerfile
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - DATABASE_PATH=/data/algotrader.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - trading_data:/data
    depends_on:
      - redis

  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - DATABASE_PATH=/data/algotrader.db
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
      - BYBIT_API_KEY=${BYBIT_API_KEY}
      - IS_TESTNET={IS_TESTNET}
    volumes:
      - trading_data:/data
    depends_on:
      - redis

  monitor:
    build:
      context: .
      dockerfile: services/monitor/Dockerfile
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_PATH=/data/algotrader.db
    volumes:
      - trading_data:/data
    depends_on:
      - redis
    restart: always

volumes:
  trading_data:
  redis_data:
